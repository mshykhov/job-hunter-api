server:
  port: 8095

spring:
  datasource:
    url: jdbc:postgresql://localhost:5440/jobhunter
    username: jobhunter
    password: jobhunter

  jpa:
    show-sql: false

management:
  endpoint:
    health:
      show-details: always

jobhunter:
  oidc:
    enabled: ${OIDC_ENABLED:true}
    issuers: ${OIDC_ISSUERS:https://auth.gaynance.com/application/o/job-hunter-ui/,https://auth.gaynance.com/application/o/job-hunter-m2m/}
    audience: ${OIDC_AUDIENCE:https://api.jobhunter.com}

springdoc:
  swagger-ui:
    oauth:
      client-id: ${OIDC_CLIENT_ID:job-hunter-ui}
      use-pkce-with-authorization-code-grant: true
